
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.section { margin-bottom: 1.5rem; }
.section-title { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; }
.field input, .field select, .field textarea { font-family: var(--font-sans); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 7px 10px; width: 100%; }
.field textarea { resize: vertical; min-height: 60px; }
.bias-row { display: flex; gap: 8px; }
.bias-btn { flex: 1; padding: 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.bias-btn.bull.active { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
.bias-btn.bear.active { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; }
.bias-btn.neutral.active { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
.checklist { display: flex; flex-direction: column; gap: 8px; }
.check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--color-text-primary); cursor: pointer; user-select: none; }
.check-item input[type=checkbox] { width: 16px; height: 16px; accent-color: #639922; cursor: pointer; flex-shrink: 0; }
.check-item.checked { color: var(--color-text-secondary); text-decoration: line-through; }
.outcome-row { display: flex; gap: 8px; }
.outcome-btn { flex: 1; padding: 8px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.outcome-btn.win.active { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
.outcome-btn.loss.active { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; }
.outcome-btn.be.active { background: #FAEEDA; border-color: #BA7517; color: #854F0B; }
.outcome-btn.missed.active { background: var(--color-background-secondary); border-color: var(--color-border-primary); color: var(--color-text-primary); }
.save-btn { width: 100%; padding: 10px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; }
.save-btn:hover { background: var(--color-background-secondary); }
.save-btn:active { transform: scale(0.98); }
.log-entry { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; margin-bottom: 8px; }
.log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.log-date { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.log-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
.log-badge.win { background: #EAF3DE; color: #3B6D11; }
.log-badge.loss { background: #FCEBEB; color: #791F1F; }
.log-badge.be { background: #FAEEDA; color: #854F0B; }
.log-badge.missed { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.log-detail { font-size: 12px; color: var(--color-text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
.log-note { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; font-style: italic; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 4px; }
.tab-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); color: var(--color-text-secondary); transition: all 0.15s; }
.tab.active { background: var(--color-background-primary); border-color: var(--color-border-primary); color: var(--color-text-primary); }
.empty-state { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 13px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.delete-btn { font-size: 11px; color: var(--color-text-secondary); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.delete-btn:hover { color: #A32D2D; }
</style>

<h2 class="sr-only">US100 Trading Journal — log your daily bias, setups, and trade outcomes</h2>

<div style="padding: 1rem 0;">
  <div class="tab-row">
    <div class="tab active" onclick="switchTab('log')" id="tab-log">Log trade</div>
    <div class="tab" onclick="switchTab('history')" id="tab-history">History</div>
    <div class="tab" onclick="switchTab('stats')" id="tab-stats">Stats</div>
  </div>

  <div id="view-log">
    <div class="section">
      <div class="section-title">Session info</div>
      <div class="card">
        <div class="grid2" style="margin-bottom: 12px;">
          <div class="field">
            <label>Date</label>
            <input type="date" id="f-date" />
          </div>
          <div class="field">
            <label>Asset</label>
            <input type="text" id="f-asset" value="US100" />
          </div>
        </div>
        <div class="field">
          <label>Daily bias</label>
          <div class="bias-row" style="margin-top: 4px;">
            <button class="bias-btn bull" onclick="setBias('bull')">↑ Bullish</button>
            <button class="bias-btn bear" onclick="setBias('bear')">↓ Bearish</button>
            <button class="bias-btn neutral" onclick="setBias('neutral')">— Neutral</button>
          </div>
        </div>
        <div class="field" style="margin-top: 12px;">
          <label>Bias reasoning (liquidity, trend, key levels)</label>
          <textarea id="f-bias-reason" placeholder="e.g. Yesterday closed bullish, EQL at 18240 below. Expecting sweep of lows then long..."></textarea>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Setup checklist</div>
      <div class="card">
        <div class="checklist">
          <label class="check-item" id="chk0"><input type="checkbox" onchange="toggleCheck(0)" /> 1H + 15M highs and lows marked pre-9:30</label>
          <label class="check-item" id="chk1"><input type="checkbox" onchange="toggleCheck(1)" /> Bias aligns with setup direction</label>
          <label class="check-item" id="chk2"><input type="checkbox" onchange="toggleCheck(2)" /> Clear liquidity sweep confirmed</label>
          <label class="check-item" id="chk3"><input type="checkbox" onchange="toggleCheck(3)" /> CHOCH on 1M / 2M after sweep</label>
          <label class="check-item" id="chk4"><input type="checkbox" onchange="toggleCheck(4)" /> IFVG identified and valid</label>
          <label class="check-item" id="chk5"><input type="checkbox" onchange="toggleCheck(5)" /> Price retested IFVG cleanly (no full close through)</label>
          <label class="check-item" id="chk6"><input type="checkbox" onchange="toggleCheck(6)" /> SL placed beyond sweep point</label>
          <label class="check-item" id="chk7"><input type="checkbox" onchange="toggleCheck(7)" /> RR is minimum 1:2</label>
        </div>
        <div style="margin-top: 10px; font-size: 12px; color: var(--color-text-secondary);" id="checklist-score">0 / 8 criteria met</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Trade details</div>
      <div class="card">
        <div class="grid3" style="margin-bottom: 12px;">
          <div class="field">
            <label>Entry</label>
            <input type="number" id="f-entry" placeholder="18340" step="0.1" />
          </div>
          <div class="field">
            <label>Stop loss</label>
            <input type="number" id="f-sl" placeholder="18310" step="0.1" />
          </div>
          <div class="field">
            <label>Take profit</label>
            <input type="number" id="f-tp" placeholder="18400" step="0.1" />
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>Entry time</label>
            <input type="time" id="f-time" />
          </div>
          <div class="field">
            <label>Calculated RR</label>
            <input type="text" id="f-rr" placeholder="Auto" readonly style="color: var(--color-text-secondary);" />
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Outcome</div>
      <div class="card">
        <div class="outcome-row" style="margin-bottom: 12px;">
          <button class="outcome-btn win" onclick="setOutcome('win')">Win</button>
          <button class="outcome-btn loss" onclick="setOutcome('loss')">Loss</button>
          <button class="outcome-btn be" onclick="setOutcome('be')">Break even</button>
          <button class="outcome-btn missed" onclick="setOutcome('missed')">Missed</button>
        </div>
        <div class="field" style="margin-bottom: 12px;">
          <label>What went well</label>
          <textarea id="f-good" placeholder="e.g. Waited patiently for the retest, didn't rush entry..."></textarea>
        </div>
        <div class="field">
          <label>What to improve / why I missed</label>
          <textarea id="f-improve" placeholder="e.g. Entered before the retest confirmed, moved SL too early..."></textarea>
        </div>
      </div>
    </div>

    <button class="save-btn" onclick="saveEntry()"><i class="ti ti-check" aria-hidden="true" style="margin-right: 6px;"></i>Save to journal</button>
  </div>

  <div id="view-history" style="display:none;">
    <div id="history-list"></div>
  </div>

  <div id="view-stats" style="display:none;">
    <div class="stats-grid" id="stats-grid"></div>
    <div id="bias-breakdown"></div>
  </div>
</div>

<script>
const KEY = 'trading_journal_v1';
let entries = [];
let bias = '';
let outcome = '';
let checks = [false,false,false,false,false,false,false,false];

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) entries = JSON.parse(raw);
  } catch(e) { entries = []; }
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(entries)); } catch(e) {}
}

load();

const today = new Date();
document.getElementById('f-date').value = today.toISOString().split('T')[0];

function setBias(b) {
  bias = b;
  document.querySelectorAll('.bias-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.bias-btn.' + b).classList.add('active');
}

function setOutcome(o) {
  outcome = o;
  document.querySelectorAll('.outcome-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.outcome-btn.' + o).classList.add('active');
}

function toggleCheck(i) {
  checks[i] = document.querySelectorAll('.checklist input[type=checkbox]')[i].checked;
  const item = document.getElementById('chk' + i);
  if (checks[i]) item.classList.add('checked'); else item.classList.remove('checked');
  const count = checks.filter(Boolean).length;
  document.getElementById('checklist-score').textContent = count + ' / 8 criteria met';
}

function calcRR() {
  const e = parseFloat(document.getElementById('f-entry').value);
  const sl = parseFloat(document.getElementById('f-sl').value);
  const tp = parseFloat(document.getElementById('f-tp').value);
  if (!isNaN(e) && !isNaN(sl) && !isNaN(tp) && sl !== e) {
    const rr = Math.abs(tp - e) / Math.abs(e - sl);
    document.getElementById('f-rr').value = '1:' + rr.toFixed(2);
  }
}

['f-entry','f-sl','f-tp'].forEach(id => document.getElementById(id).addEventListener('input', calcRR));

function saveEntry() {
  const date = document.getElementById('f-date').value;
  const asset = document.getElementById('f-asset').value || 'US100';
  const biasReason = document.getElementById('f-bias-reason').value;
  const entry = document.getElementById('f-entry').value;
  const sl = document.getElementById('f-sl').value;
  const tp = document.getElementById('f-tp').value;
  const time = document.getElementById('f-time').value;
  const rr = document.getElementById('f-rr').value;
  const good = document.getElementById('f-good').value;
  const improve = document.getElementById('f-improve').value;
  const checkCount = checks.filter(Boolean).length;

  if (!date || !bias || !outcome) {
    alert('Please fill in date, bias, and outcome before saving.');
    return;
  }

  entries.unshift({ date, asset, bias, biasReason, entry, sl, tp, time, rr, outcome, good, improve, checkCount, checks: [...checks], id: Date.now() });
  save();

  bias = ''; outcome = '';
  checks = [false,false,false,false,false,false,false,false];
  document.querySelectorAll('.bias-btn, .outcome-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.checklist input[type=checkbox]').forEach(c => c.checked = false);
  document.querySelectorAll('.check-item').forEach(c => c.classList.remove('checked'));
  document.getElementById('checklist-score').textContent = '0 / 8 criteria met';
  ['f-bias-reason','f-entry','f-sl','f-tp','f-time','f-rr','f-good','f-improve'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-asset').value = 'US100';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  switchTab('history');
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  renderHistory();
  renderStats();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!entries.length) { el.innerHTML = '<div class="empty-state">No trades logged yet.<br>Add your first entry in the Log trade tab.</div>'; return; }
  el.innerHTML = entries.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
    const biasLabel = e.bias === 'bull' ? '↑ Bullish' : e.bias === 'bear' ? '↓ Bearish' : '— Neutral';
    const rr = e.rr || '—';
    const outcomeLabel = { win:'Win', loss:'Loss', be:'Break even', missed:'Missed' }[e.outcome] || e.outcome;
    const note = e.improve || e.good;
    return `<div class="log-entry">
      <div class="log-header">
        <span class="log-date">${dateStr} · ${e.asset}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="log-badge ${e.outcome}">${outcomeLabel}</span>
          <button class="delete-btn" onclick="deleteEntry(${e.id})" aria-label="Delete entry"><i class="ti ti-trash" style="font-size:13px;" aria-hidden="true"></i></button>
        </div>
      </div>
      <div class="log-detail">
        <span>${biasLabel}</span>
        ${e.entry ? '<span>Entry: ' + e.entry + '</span>' : ''}
        ${e.sl ? '<span>SL: ' + e.sl + '</span>' : ''}
        ${e.tp ? '<span>TP: ' + e.tp + '</span>' : ''}
        ${rr !== '—' ? '<span>RR: ' + rr + '</span>' : ''}
        <span>${e.checkCount}/8 checks</span>
      </div>
      ${note ? '<div class="log-note">' + note.substring(0, 120) + (note.length > 120 ? '…' : '') + '</div>' : ''}
    </div>`;
  }).join('');
}

function renderStats() {
  const el = document.getElementById('stats-grid');
  const bb = document.getElementById('bias-breakdown');
  if (!entries.length) {
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Log trades to see your stats.</div>';
    bb.innerHTML = '';
    return;
  }

  const total = entries.length;
  const wins = entries.filter(e => e.outcome === 'win').length;
  const losses = entries.filter(e => e.outcome === 'loss').length;
  const missed = entries.filter(e => e.outcome === 'missed').length;
  const winrate = total - missed > 0 ? Math.round((wins / (total - missed)) * 100) : 0;
  const avgChecks = Math.round(entries.reduce((s, e) => s + (e.checkCount || 0), 0) / total);

  el.innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Total sessions</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#3B6D11">${wins}</div><div class="stat-label">Wins</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#A32D2D">${losses}</div><div class="stat-label">Losses</div></div>
    <div class="stat-card"><div class="stat-val">${winrate}%</div><div class="stat-label">Win rate</div></div>
    <div class="stat-card"><div class="stat-val">${avgChecks}/8</div><div class="stat-label">Avg checklist</div></div>
    <div class="stat-card"><div class="stat-val">${missed}</div><div class="stat-label">Missed setups</div></div>
  `;

  const bullWins = entries.filter(e => e.bias === 'bull' && e.outcome === 'win').length;
  const bullTotal = entries.filter(e => e.bias === 'bull' && e.outcome !== 'missed').length;
  const bearWins = entries.filter(e => e.bias === 'bear' && e.outcome === 'win').length;
  const bearTotal = entries.filter(e => e.bias === 'bear' && e.outcome !== 'missed').length;

  bb.innerHTML = `
    <div class="section-title" style="margin-bottom:8px;">Bias performance</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;">
        <span style="color:var(--color-text-secondary)">Bullish days</span>
        <span style="color:#3B6D11;font-weight:500">${bullTotal ? bullWins + '/' + bullTotal + ' (' + Math.round(bullWins/bullTotal*100) + '%)' : '—'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;">
        <span style="color:var(--color-text-secondary)">Bearish days</span>
        <span style="color:#A32D2D;font-weight:500">${bearTotal ? bearWins + '/' + bearTotal + ' (' + Math.round(bearWins/bearTotal*100) + '%)' : '—'}</span>
      </div>
    </div>
  `;
}

function switchTab(t) {
  ['log','history','stats'].forEach(tab => {
    document.getElementById('view-' + tab).style.display = tab === t ? 'block' : 'none';
    document.getElementById('tab-' + tab).classList.toggle('active', tab === t);
  });
  if (t === 'history') renderHistory();
  if (t === 'stats') renderStats();
}
</script>
